name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject Supabase credentials into supabase.js
        run: |
          sed -i "s|https://YOUR_PROJECT_REF.supabase.co|${{ secrets.SUPABASE_URL }}|g" js/supabase.js
          sed -i "s|YOUR_ANON_KEY|${{ secrets.SUPABASE_ANON_KEY }}|g" js/supabase.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4