name: Daily Scorecard Scraper

on:
  schedule:
    # 03:00 UTC = 06:00 EAT (UTC+3)
    - cron: "0 3 * * *"
  workflow_dispatch:   # allows manual trigger from the GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome & ChromeDriver
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            google-chrome-stable \
            chromium-chromedriver \
            || true
          # Fallback: use the setup-chrome action approach
          which chromedriver || sudo ln -s /usr/bin/chromedriver /usr/local/bin/chromedriver

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium beautifulsoup4 supabase python-dotenv

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scorecard_scraper.py --batch-size 100