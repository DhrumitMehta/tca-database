<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCA Cricket — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<style>
  :root {
    --bg:#0a0c0f; --surface:#111318; --surface2:#1a1d24;
    --border:#252830; --accent:#e8ff47; --accent2:#47c8ff;
    --red:#ff5252; --green:#4ade80; --text:#f0f2f5;
    --muted:#6b7280; --muted2:#9ca3af;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,255,71,0.03) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.012) 80px),
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.012) 80px);
    pointer-events:none; z-index:0;
  }

  /* ── HEADER ── */
  header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 2rem; display:flex; align-items:center;
    justify-content:space-between; height:64px;
    position:sticky; top:0; z-index:100;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon { width:36px; height:36px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .logo h1 { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:2px; }
  .logo span { font-size:0.75rem; color:var(--muted); font-weight:300; letter-spacing:1px; text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:10px; }

  /* ── LAYOUT ── */
  .container { max-width:1200px; margin:0 auto; padding:2.5rem 2rem; position:relative; z-index:1; }

  /* ── WELCOME STRIP ── */
  .welcome {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:2.5rem; flex-wrap:wrap; gap:1rem;
  }
  .welcome-text h2 {
    font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px;
    color:var(--text); line-height:1;
  }
  .welcome-text p { font-size:0.875rem; color:var(--muted2); margin-top:4px; }
  .role-badge {
    background:rgba(232,255,71,0.1); color:var(--accent);
    border:1px solid rgba(232,255,71,0.25); border-radius:6px;
    padding:6px 14px; font-size:0.75rem; font-weight:600;
    text-transform:uppercase; letter-spacing:1.5px;
  }

  /* ── NAV GRID ── */
  .nav-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:14px; margin-bottom:2.5rem;
  }

  .nav-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:1.5rem;
    text-decoration:none; color:var(--text);
    display:flex; flex-direction:column; gap:12px;
    transition:border-color 0.2s, background 0.2s, transform 0.15s;
    cursor:pointer; position:relative; overflow:hidden;
  }
  .nav-card::before {
    content:''; position:absolute; inset:0; opacity:0;
    background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,255,71,0.06), transparent);
    transition:opacity 0.2s;
  }
  .nav-card:hover { border-color:rgba(232,255,71,0.35); transform:translateY(-2px); }
  .nav-card:hover::before { opacity:1; }
  .nav-card.disabled { opacity:0.4; pointer-events:none; }

  .card-icon {
    width:44px; height:44px; border-radius:10px;
    background:var(--surface2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .nav-card:hover .card-icon { border-color:rgba(232,255,71,0.3); }

  .card-body { flex:1; }
  .card-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:1.5px; color:var(--text); margin-bottom:4px; }
  .card-desc { font-size:0.8rem; color:var(--muted2); line-height:1.5; }

  .card-arrow {
    align-self:flex-end; color:var(--muted); font-size:1rem;
    transition:color 0.2s, transform 0.2s;
  }
  .nav-card:hover .card-arrow { color:var(--accent); transform:translateX(4px); }

  /* ── PROFILE CARD ── */
  .profile-section { margin-bottom:2.5rem; }
  .section-label {
    font-size:0.65rem; text-transform:uppercase; letter-spacing:2px;
    color:var(--muted); font-weight:700; margin-bottom:12px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .profile-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:1.5rem;
    display:flex; align-items:center; gap:1.25rem; flex-wrap:wrap;
  }
  .profile-avatar {
    width:56px; height:56px; border-radius:12px;
    background:linear-gradient(135deg, rgba(232,255,71,0.2), rgba(71,200,255,0.1));
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--accent);
    letter-spacing:1px; flex-shrink:0;
  }
  .profile-info { flex:1; min-width:180px; }
  .profile-name { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:1px; line-height:1.1; }
  .profile-email { font-size:0.8rem; color:var(--muted2); margin-top:3px; }
  .profile-meta { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .meta-tag {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:4px; padding:2px 8px; font-size:0.7rem;
    color:var(--muted2); font-weight:500; text-transform:uppercase; letter-spacing:0.5px;
  }
  .meta-tag.accent { background:rgba(232,255,71,0.1); color:var(--accent); border-color:rgba(232,255,71,0.2); }
  .profile-actions { display:flex; gap:8px; }

  /* ── BUTTONS ── */
  .btn { padding:9px 16px; border-radius:8px; font-size:0.875rem; font-weight:500; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn-ghost { background:transparent; color:var(--muted2); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:var(--muted2); color:var(--text); }
  .btn-danger { background:rgba(255,82,82,0.08); color:var(--red); border:1px solid rgba(255,82,82,0.15); }
  .btn-danger:hover { background:rgba(255,82,82,0.15); }
  .btn-primary { background:var(--accent); color:#000; font-weight:600; }
  .btn-primary:hover { background:#d4eb3a; }
  .btn-sm { padding:6px 12px; font-size:0.8rem; }

  /* ── EDIT PROFILE MODAL ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; width:440px; max-width:95vw; }
  .modal h2 { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; margin-bottom:0.5rem; }
  .modal p { font-size:0.875rem; color:var(--muted2); margin-bottom:1.5rem; line-height:1.5; }
  .form-group { margin-bottom:1rem; }
  .form-group label { display:block; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--muted2); margin-bottom:6px; }
  .form-group input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:8px; font-size:0.875rem; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s; }
  .form-group input:focus { border-color:var(--accent); }
  .modal-actions { display:flex; gap:8px; margin-top:1.5rem; justify-content:flex-end; }

  .alert { border-radius:8px; padding:10px 14px; font-size:0.85rem; margin-top:1rem; }
  .alert-error { background:rgba(255,82,82,0.08); border:1px solid rgba(255,82,82,0.2); color:#ffaaaa; }
  .alert-success { background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.2); color:#86efac; }

  /* ── LOADING ── */
  .loading-state { text-align:center; padding:4rem 2rem; color:var(--muted2); }
  .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:640px) {
    .container { padding:1.5rem 1rem; }
    header { padding:0 1rem; }
    .logo h1 { font-size:1.3rem; }
    .nav-grid { grid-template-columns:1fr 1fr; }
    .profile-card { flex-direction:column; align-items:flex-start; }
  }
  @media (max-width:400px) {
    .nav-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏏</div>
    <div>
      <h1>TCA CRICKET</h1>
      <span>Association Portal</span>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost btn-sm" onclick="openEditProfile()">✏ Edit Profile</button>
    <button class="btn btn-danger btn-sm" onclick="signOut()">Sign Out</button>
  </div>
</header>

<div class="container">
  <div id="loadingState" class="loading-state">
    <div class="spinner"></div>
    <p>Loading your dashboard…</p>
  </div>

  <div id="dashContent" style="display:none">

    <!-- WELCOME -->
    <div class="welcome">
      <div class="welcome-text">
        <h2 id="welcomeHeading">WELCOME BACK</h2>
        <p id="welcomeSub">Tanzania Cricket Association · Member Portal</p>
      </div>
      <span class="role-badge" id="roleBadge">—</span>
    </div>

    <!-- PROFILE -->
    <div class="profile-section">
      <div class="section-label">Your Profile</div>
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="profileName">—</div>
          <div class="profile-email" id="profileEmail">—</div>
          <div class="profile-meta" id="profileMeta"></div>
        </div>
        <div class="profile-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEditProfile()">✏ Edit Profile</button>
        </div>
      </div>
    </div>

    <!-- NAV CARDS -->
    <div class="section-label">Navigation</div>
    <div class="nav-grid" id="navGrid"></div>

  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="editProfileModal">
  <div class="modal">
    <h2>Edit Profile</h2>
    <p>Update your display name. Contact your board administrator to change your role or email.</p>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="editNameInput" placeholder="Your full name"
             onkeydown="if(event.key==='Enter') saveProfile()">
    </div>
    <div id="profileAlertBox" style="display:none" class="alert"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditProfile()">Cancel</button>
      <button class="btn btn-primary" id="saveProfileBtn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>

  // All nav links by role
  const ALL_LINKS = [
    {
      href: 'stats.html',
      icon: '📊',
      title: 'Stats Dashboard',
      desc: 'Batting, bowling, fielding and all-round leaderboards with filters and exports.',
      roles: ['board', 'selector', 'national_coach', 'regional_coach', 'umpire'],
    },
    {
      href: 'selectors.html',
      icon: '📋',
      title: 'Squad Selection',
      desc: 'Build and compare squads, shortlist players for upcoming matches.',
      roles: ['board', 'selector'],
    },
    {
      href: 'players.html',
      icon: '👤',
      title: 'Players',
      desc: 'View and edit player profiles. Regional coaches see their region only.',
      roles: ['board', 'national_coach', 'regional_coach'],
    },
    {
      href: 'matches.html',
      icon: '🏟',
      title: 'Matches',
      desc: 'Enter and manage match scorecards and results.',
      roles: ['board'],
    },
    {
      href: 'admin.html',
      icon: '⚙',
      title: 'Admin',
      desc: 'Manage user accounts, roles, and system settings.',
      roles: ['board'],
    },
    {
      href: 'people.html',
      icon: '🧑‍💼',
      title: 'People Directory',
      desc: 'Umpires, coaches and NGB paid staff records.',
      roles: ['board'],
    },
    {
      href: 'umpires.html',
      icon: '🧑‍⚖️',
      title: 'My Umpire Profile',
      desc: 'View and update your umpire information and availability.',
      roles: ['umpire'],
    },
    {
      href: 'public.html',
      icon: '🌐',
      title: 'Public Stats',
      desc: 'View the public-facing stats page as seen by anyone.',
      roles: ['board', 'selector', 'national_coach', 'regional_coach', 'umpire'],
      external: true,
    },
  ];

  const ROLE_LABELS = {
    board:           'Board',
    selector:        'Selector',
    national_coach:  'National Coach',
    regional_coach:  'Regional Coach',
    umpire:          'Umpire',
    ngb_paid_staff:  'NGB Paid Staff',
  };

  let currentProfile = null;

  async function init() {
    const profile = await requireAuth(['board', 'selector', 'national_coach', 'regional_coach', 'umpire', 'ngb_paid_staff']);
    if (!profile) return;
    currentProfile = profile;
    renderDashboard(profile);
  }

  function getInitials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function renderDashboard(profile) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('dashContent').style.display = '';

    const name = profile.full_name || profile.email || 'Member';
    const firstName = name.split(' ')[0];
    const roleLabel = ROLE_LABELS[profile.role] || profile.role || 'Member';

    document.getElementById('welcomeHeading').textContent = `WELCOME BACK, ${firstName.toUpperCase()}`;
    document.getElementById('roleBadge').textContent = roleLabel;
    document.getElementById('profileAvatar').textContent = getInitials(name);
    document.getElementById('profileName').textContent = name;
    document.getElementById('profileEmail').textContent = profile.email || '';

    // Meta tags
    const metaTags = [`<span class="meta-tag accent">${roleLabel}</span>`];
    if (profile.region) metaTags.push(`<span class="meta-tag">${profile.region}</span>`);
    document.getElementById('profileMeta').innerHTML = metaTags.join('');

    // Nav cards
    const links = ALL_LINKS.filter(l => l.roles.includes(profile.role));
    document.getElementById('navGrid').innerHTML = links.map(l => `
      <a class="nav-card" href="${l.href}" ${l.external ? 'target="_blank"' : ''}>
        <div class="card-icon">${l.icon}</div>
        <div class="card-body">
          <div class="card-title">${l.title}</div>
          <div class="card-desc">${l.desc}</div>
        </div>
        <span class="card-arrow">→</span>
      </a>
    `).join('');
  }

  // ── EDIT PROFILE ──────────────────────────────────────────

  window.openEditProfile = function() {
    document.getElementById('editNameInput').value = currentProfile?.full_name || '';
    document.getElementById('profileAlertBox').style.display = 'none';
    document.getElementById('editProfileModal').classList.add('open');
    setTimeout(() => document.getElementById('editNameInput').focus(), 80);
  };

  window.closeEditProfile = function() {
    document.getElementById('editProfileModal').classList.remove('open');
  };

  window.saveProfile = async function() {
    const name = document.getElementById('editNameInput').value.trim();
    const btn  = document.getElementById('saveProfileBtn');
    if (!name) { showProfileAlert('Please enter your name.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Saving…';

    const { error } = await window.supabase
      .from('profiles')
      .update({ full_name: name })
      .eq('id', currentProfile.id);

    btn.disabled = false;
    btn.textContent = 'Save Changes';

    if (error) {
      showProfileAlert(error.message, 'error');
    } else {
      currentProfile.full_name = name;
      showProfileAlert('Profile updated.', 'success');
      setTimeout(() => {
        closeEditProfile();
        renderDashboard(currentProfile);
      }, 900);
    }
  };

  function showProfileAlert(msg, type) {
    const el = document.getElementById('profileAlertBox');
    el.textContent = msg;
    el.className = `alert alert-${type}`;
    el.style.display = 'block';
  }

  // ── SIGN OUT ──────────────────────────────────────────────
  window.signOut = async function() {
    await window.supabase.auth.signOut();
    window.location.href = 'index.html';
  };

  // ── CLOSE MODAL ON OUTSIDE CLICK ─────────────────────────
  document.getElementById('editProfileModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeEditProfile();
  });

  init();
</script>
</body>
</html>
