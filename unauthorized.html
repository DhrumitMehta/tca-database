<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unauthorized — TCA Cricket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<style>
  :root {
    --bg:#0a0c0f; --surface:#111318; --border:#252830;
    --accent:#e8ff47; --red:#ff5252; --text:#f0f2f5; --muted2:#9ca3af;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:2.5rem; max-width:420px; text-align:center;
  }
  .icon { font-size:2.5rem; margin-bottom:1rem; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:2px; margin-bottom:0.5rem; color:var(--red); }
  p { font-size:0.9rem; color:var(--muted2); line-height:1.6; margin-bottom:1.5rem; }
  .btn {
    display:inline-block; padding:10px 20px; border-radius:8px;
    font-size:0.875rem; font-weight:600; text-decoration:none;
    background:var(--accent); color:#000;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>ACCESS DENIED</h1>
    <p>Your account does not have permission to view this page. If you believe this is a mistake, contact your board administrator.</p>
    <a class="btn" href="dashboard.html">Go to Dashboard</a>
  </div>
</body>
</html>
